<!DOCTYPE html>
<html>
<head>
<style>
  .caixa-exemplo {
    width: 300px;
    background-color: lightblue;
    
    /* A mágica acontece aqui: */
    padding: 20px;   /* Espaço interno (entre texto e borda) */
    border: 5px solid navy; /* A linha em volta */
    margin: 30px;    /* Espaço externo (afasta de outros elementos) */
  }
</style>
</head>
<body>

  <div class="caixa-exemplo">
    Este texto está dentro de uma caixa com margin, border e padding.
  </div>

</body>
</html>
